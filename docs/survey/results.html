<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXADアンケート - 回答結果</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #38bdf8; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
    .stats { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: #1e293b; border-radius: 12px; padding: 1rem 1.5rem; border: 1px solid #334155; flex: 1; text-align: center; }
    .stat-card .num { font-size: 2rem; font-weight: bold; color: #38bdf8; }
    .stat-card .label { font-size: 0.8rem; color: #94a3b8; }
    .section { background: #1e293b; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #334155; }
    .section h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #f1f5f9; }
    .bar-row { display: flex; align-items: center; margin-bottom: 0.5rem; gap: 0.75rem; }
    .bar-label { min-width: 180px; font-size: 0.85rem; text-align: right; color: #94a3b8; }
    .bar-track { flex: 1; background: #0f172a; border-radius: 4px; height: 24px; }
    .bar-fill { background: #38bdf8; height: 100%; border-radius: 4px; transition: width 0.5s; min-width: 2px; }
    .bar-count { min-width: 2.5rem; font-size: 0.85rem; color: #94a3b8; }
    .ranking-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: #0f172a; border-radius: 8px; margin-bottom: 0.5rem; }
    .ranking-row .medal { font-size: 1.2rem; min-width: 2rem; }
    .ranking-row .feat-name { flex: 1; font-size: 0.9rem; }
    .ranking-row .score { color: #38bdf8; font-weight: bold; }
    .free-text { margin-bottom: 0.75rem; padding: 0.75rem; background: #0f172a; border-radius: 8px; font-size: 0.9rem; border-left: 3px solid #38bdf8; }
    .page-comment-item { margin-bottom: 0.4rem; padding: 0.5rem 0.75rem; background: #0f172a; border-radius: 6px; font-size: 0.85rem; border-left: 2px solid #facc15; }
    .page-comment-item .pn { color: #facc15; font-size: 0.8rem; }
    .q2-detail { margin-top: 0.4rem; padding: 0.5rem 0.75rem; background: #0f172a; border-radius: 6px; font-size: 0.85rem; border-left: 2px solid #f87171; }
    .empty { color: #64748b; font-style: italic; }
    .refresh-btn { padding: 0.5rem 1rem; background: #334155; color: #e2e8f0; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .refresh-btn:hover { background: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 AXADアンケート結果</h1>
    <p class="subtitle">リアルタイム集計</p>
    <button class="refresh-btn" onclick="loadData()">🔄 更新</button>
    <div class="stats"><div class="stat-card"><div class="num" id="cnt">-</div><div class="label">回答数</div></div><div class="stat-card"><div class="num" id="ss">-</div><div class="label">スプシ依存あり</div></div></div>
    <div class="section"><h2>回答者</h2><div id="respondents" style="font-size:0.9rem;color:#94a3b8;"></div></div>
    <div class="section"><h2>Q1. よく使うページ</h2><div id="q1c"></div><div id="q1cm" style="margin-top:1rem"></div></div>
    <div class="section"><h2>Q2. スプレッドシート依存</h2><div id="q2r"></div></div>
    <div class="section"><h2>Q3. 自動化してほしいこと</h2><div id="q3r"></div></div>
    <div class="section"><h2>Q4. 欲しい機能 TOP3</h2><div style="color:#94a3b8;font-size:0.8rem;margin-bottom:1rem">1位=3pt, 2位=2pt, 3位=1pt</div><div id="q4r"></div></div>
    <div class="section"><h2>Q5. その他の要望</h2><div id="q5r"></div></div>
  </div>
  <script>
    async function loadData() {
      const res = await fetch("https://webhook.nishiyama-hq.com/survey/results");
      const data = await res.json();
      render(data);
    }
    function render(R) {
      const n = R.length;
      document.getElementById("cnt").textContent = n;
      const names = R.map(r => r.respondent).filter(Boolean);
      document.getElementById("respondents").innerHTML = names.length ? names.join("、") : '<span class="empty">まだ回答なし</span>';
      if (!n) { document.getElementById("ss").textContent = "-"; return; }
      const pc = {}, cm = [];
      R.forEach((r,i) => {
        (r.q1_pages||[]).forEach(p => pc[p] = (pc[p]||0)+1);
        if (r.q1_comments) Object.entries(r.q1_comments).forEach(([p,c]) => cm.push({p,c,i:i+1}));
      });
      const s = Object.entries(pc).sort((a,b) => b[1]-a[1]);
      document.getElementById("q1c").innerHTML = s.map(([p,c]) => `<div class="bar-row"><div class="bar-label">${p}</div><div class="bar-track"><div class="bar-fill" style="width:${c/n*100}%"></div></div><div class="bar-count">${c}/${n}</div></div>`).join("");
      document.getElementById("q1cm").innerHTML = cm.length ? "<div style='font-size:0.9rem;color:#94a3b8;margin-bottom:0.5rem'>💬 ページ別コメント</div>" + cm.map(c => `<div class="page-comment-item"><div class="pn">${c.p}（回答${c.i}）</div>${c.c}</div>`).join("") : "";
      const sy = R.filter(r => r.q2_spreadsheet==="ある").length;
      document.getElementById("ss").textContent = sy;
      let q2 = sy ? [`<div style="color:#94a3b8;margin-bottom:0.5rem">${sy}/${n}人が「ある」</div>`] : ['<div class="empty">全員「ない」</div>'];
      R.forEach((r,i) => { if (r.q2_spreadsheet==="ある" && r.q2_detail) q2.push(`<div class="q2-detail">回答${i+1}: ${r.q2_detail}</div>`); });
      document.getElementById("q2r").innerHTML = q2.join("");
      const q3 = R.map(r => r.q3_automation).filter(Boolean);
      document.getElementById("q3r").innerHTML = q3.length ? q3.map(t => `<div class="free-text">${t}</div>`).join("") : '<div class="empty">回答なし</div>';
      const sc = {}, w = [3,2,1], medals = ["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣"];
      R.forEach(r => (r.q4_top3||[]).forEach((f,i) => sc[f] = (sc[f]||0)+w[i]));
      document.getElementById("q4r").innerHTML = Object.entries(sc).sort((a,b) => b[1]-a[1]).map(([f,s],i) => `<div class="ranking-row"><span class="medal">${medals[i]||""}</span><span class="feat-name">${f}</span><span class="score">${s}pt</span></div>`).join("");
      const q5 = R.map(r => r.q5_other).filter(Boolean);
      document.getElementById("q5r").innerHTML = q5.length ? q5.map(t => `<div class="free-text">${t}</div>`).join("") : '<div class="empty">回答なし</div>';
    }
    loadData();
  </script>
</body>
</html>
